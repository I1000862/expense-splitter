spring.application.name=expense-splitter
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
security.jwt.access-expiration=${ACCESS_TOKEN_EXPIRATION}
security.jwt.refresh-expiration=${REFRESH_TOKEN_EXPIRATION}
security.jwt.secret=${JWT_SECRET}
app.invite.base-url=${APP_BASE_URL}